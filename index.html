<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Chat App]</title>
  <link rel="stylesheet" href="src/output.css">
</head>
<body>
  <main>
    <section>
      <!-- graadient background -->
      <div class="background gradient"></div>
      <!-- mobile -->
      <div class="mobile rounded-t-3xl">
        <div class="border border-[var(--color-purple) bg-[var(--color-gray)] rounded-3xl]">
          <div class="gradient rounded-t-3xl flex justify-around items-center h-32">
            <div class="flex items-center gap-2">
              <i class="fa-solid fa-chevron-left text-2xl"></i>
              <img src="images/avatar.jpg" alt="" class="size-10 rounded-full">
              <div>
                <h2 class="text-2xl font-black">Samuel Green</h2>
                <h5 class="text-[var(--color-pink)]">Available to Work</h5>
              </div>
              </div>
              <h2><i class="fa-solid fa-ellipsis-vertical text-2xl"></i>  </h2>
            </div>
            <div class="m-3 py-5 space-y-5">
                <div class="leftChat">
                  <p>That sounds great. I'd be happy with that.</p>
                </div>
                <div class="rightChat">
                  <p>Could you send over some pictures of your doug, please?</p>
               </div>
            </div>


          </div>
      </div>
  </section>
  </main>

  <i class="fa-regular fa-circle"></i>
  <i class="fa-solid fa-chevron-right"></i>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Dev Philip</a>.
  </footer>
</body>
</html>
